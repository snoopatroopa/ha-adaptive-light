  curve_bri_3_4: !input curve_bri_3_4
  curve_bri_4_4: !input curve_bri_4_4
  curve_bri_5_4: !input curve_bri_5_4
  curve_bri_1_5: !input curve_bri_1_5
  curve_bri_2_5: !input curve_bri_2_5
  curve_bri_3_5: !input curve_bri_3_5
  curve_bri_4_5: !input curve_bri_4_5
  curve_bri_5_5: !input curve_bri_5_5
  period_1_mode: !input period_1_mode
  period_2_enabled: !input period_2_enabled
  period_2_start: !input period_2_start
  period_2_mode: !input period_2_mode
  period_3_enabled: !input period_3_enabled
  period_3_start: !input period_3_start
  period_3_mode: !input period_3_mode
  period_4_enabled: !input period_4_enabled
  period_4_start: !input period_4_start
  period_4_mode: !input period_4_mode
  period_5_enabled: !input period_5_enabled
  period_5_start: !input period_5_start
  period_5_mode: !input period_5_mode
  period_6_enabled: !input period_6_enabled
  period_6_start: !input period_6_start
  period_6_mode: !input period_6_mode
  period_1_target_lux: !input period_1_target_lux
  period_2_target_lux: !input period_2_target_lux
  period_3_target_lux: !input period_3_target_lux
  period_4_target_lux: !input period_4_target_lux
  period_5_target_lux: !input period_5_target_lux
  period_6_target_lux: !input period_6_target_lux
  include_night_light: !input include_night_light
  include_switch_trigger: !input include_switch_trigger
  switch_trigger_entity: !input switch_trigger_entity
  switch_off_mode: !input switch_off_mode
  bypass_switch: !input bypass_switch

  active_mode: >-
    {% set ns = namespace(result=period_1_mode) %}
    {% set t = now().strftime('%H:%M:%S') %}
    {% if period_2_enabled and t >= period_2_start %}{% set ns.result = period_2_mode %}{% endif %}
    {% if period_3_enabled and t >= period_3_start %}{% set ns.result = period_3_mode %}{% endif %}
    {% if period_4_enabled and t >= period_4_start %}{% set ns.result = period_4_mode %}{% endif %}
    {% if period_5_enabled and t >= period_5_start %}{% set ns.result = period_5_mode %}{% endif %}
    {% if period_6_enabled and t >= period_6_start %}{% set ns.result = period_6_mode %}{% endif %}
    {{ ns.result }}

  active_target_lux: >-
    {% set ns = namespace(result=period_1_target_lux | int(0)) %}
    {% set t = now().strftime('%H:%M:%S') %}
    {% if period_2_enabled and t >= period_2_start %}{% set ns.result = period_2_target_lux | int(0) %}{% endif %}
    {% if period_3_enabled and t >= period_3_start %}{% set ns.result = period_3_target_lux | int(0) %}{% endif %}
    {% if period_4_enabled and t >= period_4_start %}{% set ns.result = period_4_target_lux | int(0) %}{% endif %}
    {% if period_5_enabled and t >= period_5_start %}{% set ns.result = period_5_target_lux | int(0) %}{% endif %}
    {% if period_6_enabled and t >= period_6_start %}{% set ns.result = period_6_target_lux | int(0) %}{% endif %}
    {% if ns.result == 0 %}{{ target_lux | int }}{% else %}{{ ns.result }}{% endif %}

  effective_mode: >-
    {% if active_mode == 'night_light' and include_night_light == 'night_light_disabled' %}
      off
    {% else %}
      {{ active_mode }}
    {% endif %}

  lamp2_active: "{{ light_entity_2 | length > 0 }}"
  lamp3_active: "{{ light_entity_3 | length > 0 }}"
  lamp4_active: "{{ light_entity_4 | length > 0 }}"
  lamp5_active: "{{ light_entity_5 | length > 0 }}"

  curve_brightness_l1: >-
    {% set lux_pts = [curve_lux_1|float, curve_lux_2|float, curve_lux_3|float,
                      curve_lux_4|float, curve_lux_5|float] %}
    {% set bri_pts = [curve_bri_1_1|float, curve_bri_2_1|float, curve_bri_3_1|float,
                      curve_bri_4_1|float, curve_bri_5_1|float] %}
    {% set ambient = states(lux_sensor) | float(0) %}
    {% set ns = namespace(bri=bri_pts[0]) %}
    {% if ambient <= lux_pts[0] %}{% set ns.bri = bri_pts[0] %}
    {% elif ambient >= lux_pts[4] %}{% set ns.bri = bri_pts[4] %}
    {% else %}{% for i in range(4) %}{% if ambient >= lux_pts[i] and ambient < lux_pts[i+1] %}
      {% set t = (ambient - lux_pts[i]) / (lux_pts[i+1] - lux_pts[i]) %}
      {% set ns.bri = bri_pts[i] + t * (bri_pts[i+1] - bri_pts[i]) %}
    {% endif %}{% endfor %}{% endif %}
    {{ [1, [100, ns.bri | round(0) | int] | min] | max }}

  curve_brightness_l2: >-
    {% set lux_pts = [curve_lux_1|float, curve_lux_2|float, curve_lux_3|float,
                      curve_lux_4|float, curve_lux_5|float] %}
    {% set bri_pts = [curve_bri_1_2|float, curve_bri_2_2|float, curve_bri_3_2|float,
                      curve_bri_4_2|float, curve_bri_5_2|float] %}
    {% set ambient = states(lux_sensor) | float(0) %}
    {% set ns = namespace(bri=bri_pts[0]) %}
    {% if ambient <= lux_pts[0] %}{% set ns.bri = bri_pts[0] %}
    {% elif ambient >= lux_pts[4] %}{% set ns.bri = bri_pts[4] %}
    {% else %}{% for i in range(4) %}{% if ambient >= lux_pts[i] and ambient < lux_pts[i+1] %}
      {% set t = (ambient - lux_pts[i]) / (lux_pts[i+1] - lux_pts[i]) %}
      {% set ns.bri = bri_pts[i] + t * (bri_pts[i+1] - bri_pts[i]) %}
    {% endif %}{% endfor %}{% endif %}
    {{ [1, [100, ns.bri | round(0) | int] | min] | max }}

  curve_brightness_l3: >-
    {% set lux_pts = [curve_lux_1|float, curve_lux_2|float, curve_lux_3|float,
                      curve_lux_4|float, curve_lux_5|float] %}
    {% set bri_pts = [curve_bri_1_3|float, curve_bri_2_3|float, curve_bri_3_3|float,
                      curve_bri_4_3|float, curve_bri_5_3|float] %}
    {% set ambient = states(lux_sensor) | float(0) %}
    {% set ns = namespace(bri=bri_pts[0]) %}
    {% if ambient <= lux_pts[0] %}{% set ns.bri = bri_pts[0] %}
    {% elif ambient >= lux_pts[4] %}{% set ns.bri = bri_pts[4] %}
    {% else %}{% for i in range(4) %}{% if ambient >= lux_pts[i] and ambient < lux_pts[i+1] %}
      {% set t = (ambient - lux_pts[i]) / (lux_pts[i+1] - lux_pts[i]) %}
      {% set ns.bri = bri_pts[i] + t * (bri_pts[i+1] - bri_pts[i]) %}
    {% endif %}{% endfor %}{% endif %}
    {{ [1, [100, ns.bri | round(0) | int] | min] | max }}

  curve_brightness_l4: >-
    {% set lux_pts = [curve_lux_1|float, curve_lux_2|float, curve_lux_3|float,
                      curve_lux_4|float, curve_lux_5|float] %}
    {% set bri_pts = [curve_bri_1_4|float, curve_bri_2_4|float, curve_bri_3_4|float,
                      curve_bri_4_4|float, curve_bri_5_4|float] %}
    {% set ambient = states(lux_sensor) | float(0) %}
    {% set ns = namespace(bri=bri_pts[0]) %}
    {% if ambient <= lux_pts[0] %}{% set ns.bri = bri_pts[0] %}
    {% elif ambient >= lux_pts[4] %}{% set ns.bri = bri_pts[4] %}
    {% else %}{% for i in range(4) %}{% if ambient >= lux_pts[i] and ambient < lux_pts[i+1] %}
      {% set t = (ambient - lux_pts[i]) / (lux_pts[i+1] - lux_pts[i]) %}
      {% set ns.bri = bri_pts[i] + t * (bri_pts[i+1] - bri_pts[i]) %}
    {% endif %}{% endfor %}{% endif %}
    {{ [1, [100, ns.bri | round(0) | int] | min] | max }}

  curve_brightness_l5: >-
    {% set lux_pts = [curve_lux_1|float, curve_lux_2|float, curve_lux_3|float,
                      curve_lux_4|float, curve_lux_5|float] %}
    {% set bri_pts = [curve_bri_1_5|float, curve_bri_2_5|float, curve_bri_3_5|float,
                      curve_bri_4_5|float, curve_bri_5_5|float] %}
    {% set ambient = states(lux_sensor) | float(0) %}
    {% set ns = namespace(bri=bri_pts[0]) %}
    {% if ambient <= lux_pts[0] %}{% set ns.bri = bri_pts[0] %}
    {% elif ambient >= lux_pts[4] %}{% set ns.bri = bri_pts[4] %}
    {% else %}{% for i in range(4) %}{% if ambient >= lux_pts[i] and ambient < lux_pts[i+1] %}
      {% set t = (ambient - lux_pts[i]) / (lux_pts[i+1] - lux_pts[i]) %}
      {% set ns.bri = bri_pts[i] + t * (bri_pts[i+1] - bri_pts[i]) %}
    {% endif %}{% endfor %}{% endif %}
    {{ [1, [100, ns.bri | round(0) | int] | min] | max }}

  init_bri_1: >-
    {{ state_attr(light_entity_1, 'brightness') | float(128) / 2.55 | round | int
       if is_state(light_entity_1, 'on') else curve_brightness_l1 | int }}
  init_bri_2: >-
    {{ state_attr(light_entity_2, 'brightness') | float(128) / 2.55 | round | int
       if lamp2_active and is_state(light_entity_2, 'on') else curve_brightness_l2 | int }}
  init_bri_3: >-
    {{ state_attr(light_entity_3, 'brightness') | float(128) / 2.55 | round | int
       if lamp3_active and is_state(light_entity_3, 'on') else curve_brightness_l3 | int }}
  init_bri_4: >-
    {{ state_attr(light_entity_4, 'brightness') | float(128) / 2.55 | round | int
       if lamp4_active and is_state(light_entity_4, 'on') else curve_brightness_l4 | int }}
  init_bri_5: >-
    {{ state_attr(light_entity_5, 'brightness') | float(128) / 2.55 | round | int
       if lamp5_active and is_state(light_entity_5, 'on') else curve_brightness_l5 | int }}

# ═══════════════════════════════════════════════════════════════════════════════
trigger:
  - trigger: state
    entity_id: !input motion_sensor
    to: "on"
    id: "motion"
  - trigger: state
    entity_id: !input switch_trigger_entity
    to: "on"
    id: "switch"
  - trigger: numeric_state
    entity_id: !input lux_sensor
    below: !input lux_retrigger_threshold
    for:
      seconds: !input lux_retrigger_delay
    id: "lux_drop"

# ═══════════════════════════════════════════════════════════════════════════════
action:
  - choose:

    # ──────────────────────────────────────────────────────────────────────────
    # Branch 1: ZUSATZ-TRIGGER
    # ──────────────────────────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "switch"
        - "{{ include_switch_trigger == 'switch_enabled' }}"
      sequence:
        - action: light.turn_on
          target:
            entity_id: "{{ light_entity_1 }}"
          data:
            brightness_pct: "{{ switch_trigger_bri_1 | int }}"
            transition: "{{ light_transition | float }}"
        - choose:
            - conditions: ["{{ lamp1_use_rgb }}"]
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: "{{ light_entity_1 }}"
                  data:
                    rgb_color: "{{ lamp1_rgb_color }}"
            - conditions: ["{{ lamp1_use_color_temp }}"]
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: "{{ light_entity_1 }}"
                  data:
                    color_temp_kelvin: "{{ lamp1_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp2_active }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_2 }}"
              data:
                brightness_pct: "{{ switch_trigger_bri_2 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp2_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_2 }}"
                      data:
                        rgb_color: "{{ lamp2_rgb_color }}"
                - conditions: ["{{ lamp2_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_2 }}"
                      data:
                        color_temp_kelvin: "{{ lamp2_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp3_active }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_3 }}"
              data:
                brightness_pct: "{{ switch_trigger_bri_3 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp3_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_3 }}"
                      data:
                        rgb_color: "{{ lamp3_rgb_color }}"
                - conditions: ["{{ lamp3_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_3 }}"
                      data:
                        color_temp_kelvin: "{{ lamp3_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp4_active }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_4 }}"
              data:
                brightness_pct: "{{ switch_trigger_bri_4 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp4_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_4 }}"
                      data:
                        rgb_color: "{{ lamp4_rgb_color }}"
                - conditions: ["{{ lamp4_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_4 }}"
                      data:
                        color_temp_kelvin: "{{ lamp4_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp5_active }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_5 }}"
              data:
                brightness_pct: "{{ switch_trigger_bri_5 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp5_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_5 }}"
                      data:
                        rgb_color: "{{ lamp5_rgb_color }}"
                - conditions: ["{{ lamp5_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_5 }}"
                      data:
                        color_temp_kelvin: "{{ lamp5_color_temp_kelvin | int }}"

        - choose:
            - conditions: ["{{ switch_off_mode == 'by_switch' }}"]
              sequence:
                - wait_for_trigger:
                    - trigger: state
                      entity_id: !input switch_trigger_entity
                      to: "off"
                  continue_on_timeout: true
                  timeout:
                    hours: 4
            - conditions: ["{{ switch_off_mode == 'by_presence' }}"]
              sequence:
                - repeat:
                    while:
                      - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
                    sequence:
                      - delay:
                          seconds: 10
                - delay:
                    minutes: "{{ time_delay | float }}"
          default:
            - repeat:
                while:
                  - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0
                         and is_state(switch_trigger_entity, 'on') }}"
                sequence:
                  - delay:
                      seconds: 10
            - if:
                - "{{ is_state(switch_trigger_entity, 'on') }}"
              then:
                - delay:
                    minutes: "{{ time_delay | float }}"

        - action: light.turn_off
          target:
            entity_id: "{{ light_entity_1 }}"
          data:
            transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp2_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_2 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp3_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_3 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp4_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_4 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp5_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_5 }}"
              data:
                transition: "{{ light_transition_off | float }}"

    # ──────────────────────────────────────────────────────────────────────────
    # Branch 2: NACHTLICHT
    # ──────────────────────────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "motion"
        - "{{ effective_mode == 'night_light' }}"
      sequence:
        - action: light.turn_off
          target:
            entity_id: "{{ light_entity_1 }}"
          data:
            transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp2_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_2 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp3_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_3 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp4_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_4 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp5_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_5 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - delay:
            milliseconds: 500

        - if:
            - "{{ not lamp1_night_disabled }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_1 }}"
              data:
                brightness_pct: "{{ night_light_bri_1 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp1_night_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_1 }}"
                      data:
                        rgb_color: "{{ lamp1_night_rgb_color }}"
                - conditions: ["{{ lamp1_night_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_1 }}"
                      data:
                        color_temp_kelvin: "{{ lamp1_night_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp2_active and not lamp2_night_disabled }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_2 }}"
              data:
                brightness_pct: "{{ night_light_bri_2 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp2_night_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_2 }}"
                      data:
                        rgb_color: "{{ lamp2_night_rgb_color }}"
                - conditions: ["{{ lamp2_night_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_2 }}"
                      data:
                        color_temp_kelvin: "{{ lamp2_night_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp3_active and not lamp3_night_disabled }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_3 }}"
              data:
                brightness_pct: "{{ night_light_bri_3 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp3_night_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_3 }}"
                      data:
                        rgb_color: "{{ lamp3_night_rgb_color }}"
                - conditions: ["{{ lamp3_night_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_3 }}"
                      data:
                        color_temp_kelvin: "{{ lamp3_night_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp4_active and not lamp4_night_disabled }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_4 }}"
              data:
                brightness_pct: "{{ night_light_bri_4 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp4_night_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_4 }}"
                      data:
                        rgb_color: "{{ lamp4_night_rgb_color }}"
                - conditions: ["{{ lamp4_night_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_4 }}"
                      data:
                        color_temp_kelvin: "{{ lamp4_night_color_temp_kelvin | int }}"
        - if:
            - "{{ lamp5_active and not lamp5_night_disabled }}"
          then:
            - action: light.turn_on
              target:
                entity_id: "{{ light_entity_5 }}"
              data:
                brightness_pct: "{{ night_light_bri_5 | int }}"
                transition: "{{ light_transition | float }}"
            - choose:
                - conditions: ["{{ lamp5_night_use_rgb }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_5 }}"
                      data:
                        rgb_color: "{{ lamp5_night_rgb_color }}"
                - conditions: ["{{ lamp5_night_use_color_temp }}"]
                  sequence:
                    - action: light.turn_on
                      target:
                        entity_id: "{{ light_entity_5 }}"
                      data:
                        color_temp_kelvin: "{{ lamp5_night_color_temp_kelvin | int }}"

        - repeat:
            while:
              - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
            sequence:
              - delay:
                  seconds: 10
        - delay:
            minutes: "{{ night_time_delay | float }}"

        - action: light.turn_off
          target:
            entity_id: "{{ light_entity_1 }}"
          data:
            transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp2_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_2 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp3_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_3 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp4_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_4 }}"
              data:
                transition: "{{ light_transition_off | float }}"
        - if:
            - "{{ lamp5_active }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_5 }}"
              data:
                transition: "{{ light_transition_off | float }}"

    # ──────────────────────────────────────────────────────────────────────────
    # Branch 3: AUS
    # ──────────────────────────────────────────────────────────────────────────
    - conditions:
        - condition: trigger
          id: "motion"
        - "{{ effective_mode == 'off' }}"
      sequence: []

    # ──────────────────────────────────────────────────────────────────────────
    # Branch 4: AUFRÄUM-BRANCH (Waisenkinder-Schutz)
    #
    # FIX v5.2: lux_drop-Trigger kann mit mode:restart einen laufenden Nachlauf
    # abbrechen → Default überspringt → Lampen bleiben an.
    #
    # FIX v5.3: Bedingung prüft ob IRGENDEINE konfigurierte Lampe noch an ist,
    # nicht nur lamp1. Vorher: lamp1 bereits aus (Auto-Off / unterbrochener
    # Ausschalt-Zyklus) → lamp2-5 wurden nie ausgeschaltet.
    # ──────────────────────────────────────────────────────────────────────────
    - conditions:
        - condition: not
          conditions:
            - condition: trigger
              id: switch
        - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
        - "{{ bypass_switch | length == 0 or not is_state(bypass_switch, 'on') }}"
        - condition: or
          conditions:
            - condition: state
              entity_id: !input light_entity_1
              state: "on"
            - "{{ lamp2_active and is_state(light_entity_2, 'on') }}"
            - "{{ lamp3_active and is_state(light_entity_3, 'on') }}"
            - "{{ lamp4_active and is_state(light_entity_4, 'on') }}"
            - "{{ lamp5_active and is_state(light_entity_5, 'on') }}"
      sequence:
        - delay:
            minutes: >-
              {{ night_time_delay | float if effective_mode == 'night_light'
                 else time_delay | float }}
        - if:
            - "{{ bypass_switch | length == 0 or not is_state(bypass_switch, 'on') }}"
            - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count == 0 }}"
          then:
            - action: light.turn_off
              target:
                entity_id: "{{ light_entity_1 }}"
              data:
                transition: "{{ light_transition_off | float }}"
            - if:
                - "{{ lamp2_active }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: "{{ light_entity_2 }}"
                  data:
                    transition: "{{ light_transition_off | float }}"
            - if:
                - "{{ lamp3_active }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: "{{ light_entity_3 }}"
                  data:
                    transition: "{{ light_transition_off | float }}"
            - if:
                - "{{ lamp4_active }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: "{{ light_entity_4 }}"
                  data:
                    transition: "{{ light_transition_off | float }}"
            - if:
                - "{{ lamp5_active }}"
              then:
                - action: light.turn_off
                  target:
                    entity_id: "{{ light_entity_5 }}"
                  data:
                    transition: "{{ light_transition_off | float }}"

    # ──────────────────────────────────────────────────────────────────────────
    # Default: LUX-REGELUNG oder KONSTANT
    # ──────────────────────────────────────────────────────────────────────────
    default:
      - if:
          - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
          - "{{ effective_mode in ['lux', 'constant'] }}"
          - condition: or
            conditions:
              - "{{ effective_mode == 'constant' }}"
              - condition: state
                entity_id: !input light_entity_1
                state: "on"
              - condition: numeric_state
                entity_id: !input lux_sensor
                below: !input activation_lux_threshold
        then:
          - variables:
              on_bri_1: >-
                {{ lamp1_constant_bri | int if effective_mode == 'constant' else init_bri_1 | int }}
              on_bri_2: >-
                {{ lamp2_constant_bri | int if effective_mode == 'constant' else init_bri_2 | int }}
              on_bri_3: >-
                {{ lamp3_constant_bri | int if effective_mode == 'constant' else init_bri_3 | int }}
              on_bri_4: >-
                {{ lamp4_constant_bri | int if effective_mode == 'constant' else init_bri_4 | int }}
              on_bri_5: >-
                {{ lamp5_constant_bri | int if effective_mode == 'constant' else init_bri_5 | int }}

          - action: light.turn_on
            target:
              entity_id: "{{ light_entity_1 }}"
            data:
              brightness_pct: "{{ on_bri_1 }}"
              transition: "{{ light_transition | float }}"
          - choose:
              - conditions: ["{{ lamp1_use_rgb }}"]
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ light_entity_1 }}"
                    data:
                      rgb_color: "{{ lamp1_rgb_color }}"
              - conditions: ["{{ lamp1_use_color_temp }}"]
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ light_entity_1 }}"
                    data:
                      color_temp_kelvin: "{{ lamp1_color_temp_kelvin | int }}"
          - if:
              - "{{ lamp2_active }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: "{{ light_entity_2 }}"
                data:
                  brightness_pct: "{{ on_bri_2 }}"
                  transition: "{{ light_transition | float }}"
              - choose:
                  - conditions: ["{{ lamp2_use_rgb }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_2 }}"
                        data:
                          rgb_color: "{{ lamp2_rgb_color }}"
                  - conditions: ["{{ lamp2_use_color_temp }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_2 }}"
                        data:
                          color_temp_kelvin: "{{ lamp2_color_temp_kelvin | int }}"
          - if:
              - "{{ lamp3_active }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: "{{ light_entity_3 }}"
                data:
                  brightness_pct: "{{ on_bri_3 }}"
                  transition: "{{ light_transition | float }}"
              - choose:
                  - conditions: ["{{ lamp3_use_rgb }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_3 }}"
                        data:
                          rgb_color: "{{ lamp3_rgb_color }}"
                  - conditions: ["{{ lamp3_use_color_temp }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_3 }}"
                        data:
                          color_temp_kelvin: "{{ lamp3_color_temp_kelvin | int }}"
          - if:
              - "{{ lamp4_active }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: "{{ light_entity_4 }}"
                data:
                  brightness_pct: "{{ on_bri_4 }}"
                  transition: "{{ light_transition | float }}"
              - choose:
                  - conditions: ["{{ lamp4_use_rgb }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_4 }}"
                        data:
                          rgb_color: "{{ lamp4_rgb_color }}"
                  - conditions: ["{{ lamp4_use_color_temp }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_4 }}"
                        data:
                          color_temp_kelvin: "{{ lamp4_color_temp_kelvin | int }}"
          - if:
              - "{{ lamp5_active }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: "{{ light_entity_5 }}"
                data:
                  brightness_pct: "{{ on_bri_5 }}"
                  transition: "{{ light_transition | float }}"
              - choose:
                  - conditions: ["{{ lamp5_use_rgb }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_5 }}"
                        data:
                          rgb_color: "{{ lamp5_rgb_color }}"
                  - conditions: ["{{ lamp5_use_color_temp }}"]
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ light_entity_5 }}"
                        data:
                          color_temp_kelvin: "{{ lamp5_color_temp_kelvin | int }}"

          # ── Lux-Regelschleife ─────────────────────────────────────────────
          - if:
              - "{{ effective_mode == 'lux' }}"
            then:
              - repeat:
                  while:
                    - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0
                           or (bypass_switch | length > 0 and is_state(bypass_switch, 'on')) }}"
                  sequence:
                    - delay:
                        seconds: "{{ adjustment_interval | int }}"
                    - if:
                        - condition: state
                          entity_id: !input light_entity_1
                          state: "on"
                        - "{{ has_value(lux_sensor) }}"
                        - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
                      then:
                        - variables:
                            lux_sample_1: "{{ states(lux_sensor) | float(0) }}"
                        - delay:
                            seconds: 3
                        - variables:
                            lux_sample_2: "{{ states(lux_sensor) | float(0) }}"
                            current_lux_val: "{{ ((lux_sample_1 + lux_sample_2) / 2) | round(1) }}"
                            current_bri_1: "{{ state_attr(light_entity_1, 'brightness') | float(128) / 2.55 }}"
                            current_bri_2: >-
                              {{ state_attr(light_entity_2, 'brightness') | float(128) / 2.55
                                 if lamp2_active and is_state(light_entity_2, 'on') else 0 }}
                            current_bri_3: >-
                              {{ state_attr(light_entity_3, 'brightness') | float(128) / 2.55
                                 if lamp3_active and is_state(light_entity_3, 'on') else 0 }}
                            current_bri_4: >-
                              {{ state_attr(light_entity_4, 'brightness') | float(128) / 2.55
                                 if lamp4_active and is_state(light_entity_4, 'on') else 0 }}
                            current_bri_5: >-
                              {{ state_attr(light_entity_5, 'brightness') | float(128) / 2.55
                                 if lamp5_active and is_state(light_entity_5, 'on') else 0 }}
                            lux_deviation: "{{ active_target_lux - current_lux_val }}"

                        - choose:
                            # Auto-Off: Lampe 1 am Minimum + immer noch zu hell
                            - conditions:
                                - "{{ lux_deviation < -lux_hysteresis }}"
                                - "{{ auto_off_brightness | int > 0 }}"
                                - "{{ current_bri_1 | round | int <= auto_off_brightness | int }}"
                              sequence:
                                - action: light.turn_off
                                  target:
                                    entity_id: "{{ light_entity_1 }}"
                                  data:
                                    transition: "{{ light_transition_off | float }}"
                                - if:
                                    - "{{ lamp2_active and is_state(light_entity_2, 'on') }}"
                                  then:
                                    - action: light.turn_off
                                      target:
                                        entity_id: "{{ light_entity_2 }}"
                                      data:
                                        transition: "{{ light_transition_off | float }}"
                                - if:
                                    - "{{ lamp3_active and is_state(light_entity_3, 'on') }}"
                                  then:
                                    - action: light.turn_off
                                      target:
                                        entity_id: "{{ light_entity_3 }}"
                                      data:
                                        transition: "{{ light_transition_off | float }}"
                                - if:
                                    - "{{ lamp4_active and is_state(light_entity_4, 'on') }}"
                                  then:
                                    - action: light.turn_off
                                      target:
                                        entity_id: "{{ light_entity_4 }}"
                                      data:
                                        transition: "{{ light_transition_off | float }}"
                                - if:
                                    - "{{ lamp5_active and is_state(light_entity_5, 'on') }}"
                                  then:
                                    - action: light.turn_off
                                      target:
                                        entity_id: "{{ light_entity_5 }}"
                                      data:
                                        transition: "{{ light_transition_off | float }}"
                            # Zu dunkel → heller
                            - conditions: ["{{ lux_deviation > lux_hysteresis }}"]
                              sequence:
                                - action: light.turn_on
                                  target:
                                    entity_id: "{{ light_entity_1 }}"
                                  data:
                                    brightness_pct: >
                                      {{ [1, [100, (current_bri_1 + adjustment_step) | round | int] | min] | max }}
                                    transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp2_active and is_state(light_entity_2, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_2 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_2 + adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp3_active and is_state(light_entity_3, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_3 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_3 + adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp4_active and is_state(light_entity_4, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_4 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_4 + adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp5_active and is_state(light_entity_5, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_5 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_5 + adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                            # Zu hell → dunkler
                            - conditions: ["{{ lux_deviation < -lux_hysteresis }}"]
                              sequence:
                                - action: light.turn_on
                                  target:
                                    entity_id: "{{ light_entity_1 }}"
                                  data:
                                    brightness_pct: >
                                      {{ [1, [100, (current_bri_1 - adjustment_step) | round | int] | min] | max }}
                                    transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp2_active and is_state(light_entity_2, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_2 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_2 - adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp3_active and is_state(light_entity_3, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_3 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_3 - adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp4_active and is_state(light_entity_4, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_4 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_4 - adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"
                                - if:
                                    - "{{ lamp5_active and is_state(light_entity_5, 'on') }}"
                                  then:
                                    - action: light.turn_on
                                      target:
                                        entity_id: "{{ light_entity_5 }}"
                                      data:
                                        brightness_pct: >
                                          {{ [1, [100, (current_bri_5 - adjustment_step) | round | int] | min] | max }}
                                        transition: "{{ light_transition | float }}"

          # ── Konstant-Modus: Warten ────────────────────────────────────────
          - if:
              - "{{ effective_mode == 'constant' }}"
            then:
              - repeat:
                  while:
                    - "{{ expand(motion_sensor) | selectattr('state', 'eq', 'on') | list | count > 0
                           or (bypass_switch | length > 0 and is_state(bypass_switch, 'on')) }}"
                  sequence:
                    - delay:
                        seconds: 10

          # ── Nachlauf ──────────────────────────────────────────────────────
          - delay:
              minutes: "{{ time_delay | float }}"

          # ── Bypass-Guard ──────────────────────────────────────────────────
          - if:
              - "{{ bypass_switch | length == 0 or not is_state(bypass_switch, 'on') }}"
            then:
              - action: light.turn_off
                target:
                  entity_id: "{{ light_entity_1 }}"
                data:
                  transition: "{{ light_transition_off | float }}"
              - if:
                  - "{{ lamp2_active }}"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ light_entity_2 }}"
                    data:
                      transition: "{{ light_transition_off | float }}"
              - if:
                  - "{{ lamp3_active }}"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ light_entity_3 }}"
                    data:
                      transition: "{{ light_transition_off | float }}"
              - if:
                  - "{{ lamp4_active }}"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ light_entity_4 }}"
                    data:
                      transition: "{{ light_transition_off | float }}"
              - if:
                  - "{{ lamp5_active }}"
                then:
                  - action: light.turn_off
                    target:
                      entity_id: "{{ light_entity_5 }}"
                    data:
                      transition: "{{ light_transition_off | float }}"
