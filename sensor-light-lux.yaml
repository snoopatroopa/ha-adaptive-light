blueprint:
  name: Sensor Light – Lux-Regelung
  description: >
    # 💡 Sensor Light – Lux-Regelung

    **Version: 2026.06.21**


    Bewegungsgesteuerte Lichtregelung mit aktivem Lux-Abgleich.
    Bis zu 5 Trigger-Sensoren, **5 individuell kalibrierbare Lampen**,
    flexibles **Zeitraum-System mit 5 Slots**, Nachtlicht-Modus,
    Zusatz-Schalter-Trigger, **automatisches Nachtriggern bei
    abnehmendem** und **automatisches Ausschalten bei zunehmendem**
    Umgebungslicht.


    <details>
    <summary><b>Betriebsmodi & Ablauf:</b> 👈</summary>

    **Priorität:** Zusatz-Trigger > Nachtlicht > Lux-Regelung / Konstant / Aus


    - 🔆 **Lux-Regelung:** Bewegung → Lux-Check → Einschalten per Lichtkurve →
      Regelschleife hält Ziel-Lux → Nachlauf → Aus.

    - 💡 **Konstant:** Bewegung → Einschalten auf konfigurierter Helligkeit →
      kein Nachregeln → Nachlauf → Aus.

    - 🌙 **Nachtlicht:** Bewegung → Einschalten auf Nachtlicht-Helligkeit + eigener Farbe →
      kein Nachregeln → kurzer Nachlauf → Aus. Pro Lampe deaktivierbar.

    - ⛔ **Aus:** Keine Reaktion auf Bewegung.


    **Farbpriorität (pro Modus):** RGB überschreibt Farbtemperatur wenn beide aktiviert sind.
    Nachtlicht-Farbe ist unabhängig von der Hauptfarbe (Lux/Konstant/Schalter).

    </details>


    <details>
    <summary><b>Lichtkurve kalibrieren:</b> 👈</summary>

    Die Lichtkurve hat zwei Reiter:

    - **Lux-Messpunkte (X-Achse):** 5 Umgebungslux-Werte, gemeinsam für alle Lampen.

    - **Helligkeiten pro Lampe (Y-Achse):** 25 Helligkeitswerte (5 Punkte × 5 Lampen).


    Kalibrier-Workflow: Lux im Raum ablesen (Licht aus) → Lampen manuell so dimmen
    dass Ziel-Lux erreicht wird → Werte eintragen.

    </details>


    <details>
    <summary><b>Automatisches Nachtriggern & Ausschalten:</b> 👈</summary>

    **Nachtriggern (Licht an):** Wenn man länger im Raum sitzt und das
    Umgebungslicht abnimmt (z.B. Sonnenuntergang), schaltet sich das Licht
    automatisch ein sobald der Lux-Wert für eine bestimmte Zeit unter den
    Schwellwert fällt.


    **Auto-Ausschalten (Licht aus):** Umgekehrt – wenn das Umgebungslicht
    bei laufender Lux-Regelung heller wird, regelt die Schleife die Lampen
    nach unten. Sobald Lampe 1 unter den Auto-Off-Schwellwert (Default 3 %)
    gefallen ist UND es immer noch zu hell ist, gehen alle Lampen aus.
    Bleibt Präsenz aktiv, kann das Nachtriggern später wieder einschalten.


    Beide Features sind aktiv nur im **Lux-Modus** bei aktiver Präsenz.
    Deaktivieren durch Setzen des jeweiligen Schwellwerts auf 0.

    </details>


    <details>
    <summary><b>Changelog:</b> 👈</summary>

    **2026.06.21** – Bugfix: Race Condition im Lux-Regelkreis. Der Lux-Step-Up
    feuerte noch im letzten Schleifendurchlauf, nachdem der Bewegungssensor
    bereits abgefallen war. Geräte mit sequenzieller Transition-Verarbeitung
    (DALI / bestimmte Zigbee-Firmware) schalteten sich dadurch 1–2 Sekunden
    nach dem Ausschalten erneut ein. Fix: Lux-Messblock prüft nun zusätzlich
    ob der Bewegungssensor noch aktiv ist, bevor ein Step-Up ausgelöst wird.
    Neues Feature: Sechster Zeitraum (Zeitraum 6). Jeder Zeitraum
    erhält ein eigenes Ziel-Lux-Feld (`Ziel-Lux pro Zeitraum`). Ist der Wert 0,
    wird das globale Ziel-Lux aus dem Bereich „Lux-Regelung" als Fallback
    verwendet. Bestehende Instanzen müssen nicht angepasst werden.

    **v5.3** – Bugfix: Aufräum-Branch (Branch 4) prüfte bisher nur ob Lampe 1
    an ist. Wenn Lampe 1 durch Auto-Off oder einen unterbrochenen Ausschalt-Zyklus
    bereits aus war, blieben Lampen 2–5 dauerhaft an. Fix: Branch 4 greift jetzt
    wenn **irgendeine** konfigurierte Lampe noch leuchtet.

    **v5.2** – RGB-Farben, Nachtlicht-Farbe pro Lampe, 5 Zeiträume,
    Auto-Nachtriggern, Auto-Ausschalten.

    </details>


    Required = *
